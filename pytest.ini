    .pytest_cache
    .pytest_tmp
    tests/.pytest_cache
    tests/.pytest_tmp
    benchmarks/vendor
    benchmarks/.venv_spider2_snow
    benchmarks/spider2_snow/results
    benchmarks/spider2_snow/subsets
